<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>MovieCMS Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#f4f4f4;
}

aside{

width:240px;
background:#111827;
height:100vh;
color:white;

}

aside h2{

padding:25px;
background:#0f172a;

}

aside a{

display:block;
padding:15px 25px;
color:white;
text-decoration:none;

}

aside a:hover{

background:#1e293b;

}

main{

flex:1;
padding:30px;

}

.topo{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;

}

button{

background:#2563eb;
color:white;
border:none;
padding:12px 18px;
border-radius:6px;
cursor:pointer;

}

table{

width:100%;
background:white;
border-collapse:collapse;
border-radius:8px;
overflow:hidden;

}

th{

background:#111827;
color:white;
padding:15px;

}

td{

padding:15px;
border-bottom:1px solid #eee;

}

</style>

</head>

<body>

<aside>

<h2>🎬 MovieCMS</h2>

<a href="#">🏠 Dashboard</a>

<a href="#">🎬 Filmes</a>

<a href="#">📺 Séries</a>

<a href="#">📰 Notícias</a>

<a href="#">⚙ Configurações</a>

</aside>

<main>

<div class="topo">

<h1>Filmes</h1>

<button id="novoFilme">+ Novo Filme</button>

</div>

<table>

<thead>

<tr>

<th>ID</th>

<th>Título</th>

<th>Ano</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="filmes">

</tbody>

</table>

</main>

<script src="../js/app.js"></script>

</body>

</html>
