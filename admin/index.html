<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiTela CMS</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">
            MultiTela CMS
        </div>

        <div class="menu">

            <a href="#">Dashboard</a>

            <a href="#">Filmes</a>

            <a href="#">Séries</a>

            <a href="#">Notícias</a>

            <a href="#">Configurações</a>

        </div>

    </aside>

    <!-- CONTEÚDO -->

    <main class="content">

        <div class="topo">

            <h1>Dashboard</h1>

            <a href="novo-filme.html" class="btn">
                + Novo Filme
            </a>

        </div>

        <!-- CARDS -->

        <div class="cards">

            <div class="card">

                <h2>Total de Filmes</h2>

                <div class="numero" id="totalFilmes">
                    0
                </div>

            </div>

            <div class="card">

                <h2>Categorias</h2>

                <div class="numero">
                    0
                </div>

            </div>

            <div class="card">

                <h2>Notícias</h2>

                <div class="numero">
                    0
                </div>

            </div>

        </div>

        <!-- TABELA -->

        <div class="tabela">

            <table>

                <thead>

                    <tr>

                        <th width="60">ID</th>

                        <th>Título</th>

                        <th width="100">Ano</th>

                        <th width="120">Ações</th>

                    </tr>

                </thead>

                <tbody id="filmes">

                </tbody>

            </table>

        </div>

    </main>

    <script src="js/app.js"></script>

</body>

</html>
